<!DOCTYPE html>
<html>
<head>
    <title>Canvas Drawing App</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background-color:orange; }
        canvas { border: 2px solid #333; cursor: crosshair; background: #fff; }
        .controls { margin: 10px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>
    <h2>Interactive Drawing Canvas</h2>
    <div class="controls">
        <input type="color" id="colorPicker" value="#000000">
        <button id="clearBtn">Clear Screen</button>
    </div>
    <canvas id="drawCanvas" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const clearBtn = document.getElementById('clearBtn');

        let drawing = false;

        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#000000';

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            draw(e);
        });

        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('mouseup', () => {
            drawing = false;
            ctx.beginPath();
        });

        function draw(e) {
            if (!drawing) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.strokeStyle = colorPicker.value;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
